# 科技简报自动生成系统

name: Daily Tech Brief

on:
  schedule:
    - cron: "0 22 * * *"  # UTC 22:00 = 北京时间 6:00 AM
  workflow_dispatch: # 允许手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run publisher
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          AUTO_PUBLISH: false
          ARTICLES_COUNT: 10
          # NEWS_SOURCES 留空，使用 sources.json 的配置（包含 hackernoon）
        run: |
          python main.py --run
      
      - name: Upload drafts
        uses: actions/upload-artifact@v4
        with:
          name: drafts
          path: output/draft_*.md
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7